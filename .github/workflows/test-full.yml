---
name: Test Code Base

on:
  workflow_dispatch:
  push:
    branches: main

permissions: {}

jobs:
  build:
    name: Test Code Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Go Build
        run: CGO_ENABLED=0 go build -v -trimpath -ldflags '-w -s' ./main.go

      - name: Go Test
        run: go test -race -v ./...
