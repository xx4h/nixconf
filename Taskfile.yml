---
version: "3"

vars:
  BINDIR: ./bin
  BINNAME: nixconf
  INSTALL_PATH: /usr/local/bin
  LOCAL_INSTALL_PATH: "{{.HOME}}/.local/bin"
  MODULE: github.com/xx4h/nixconf
  # Pin to the same image super-linter@v8 resolved to in the workflow.
  SUPER_LINTER_IMAGE: ghcr.io/super-linter/super-linter:v8.6.0
  GIT_COMMIT:
    sh: git rev-parse HEAD
  GIT_SHA:
    sh: git rev-parse --short HEAD
  GIT_TAG:
    sh: git describe --tags --abbrev=0 --exact-match 2>/dev/null || echo ""
  GIT_DIRTY:
    sh: test -n "$(git status --porcelain)" && echo "dirty" || echo "clean"
  GIT_BRANCH:
    sh: git rev-parse --abbrev-ref HEAD
  VERSION:
    sh: cat VERSION 2>/dev/null || echo "dev"
  DATE:
    sh: date -Iseconds
  LDFLAGS: >-
    -w -s
    -X {{.MODULE}}/cmd.version={{.GIT_BRANCH}}-{{.GIT_DIRTY}}
    -X {{.MODULE}}/cmd.commit={{.GIT_COMMIT}}
    -X {{.MODULE}}/cmd.date={{.DATE}}

tasks:
  default:
    cmds:
      - task: build

  build:
    desc: Build the nixconf binary
    cmds:
      - >-
        CGO_ENABLED=0 go build -trimpath -ldflags '{{.LDFLAGS}}'
        -o '{{.BINDIR}}/{{.BINNAME}}' ./main.go
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BINDIR}}/{{.BINNAME}}"

  test:
    desc: Run build and style tests
    deps: [build]
    cmds:
      - task: test-style

  test-unit:
    desc: Run unit tests
    cmds:
      - cmd: echo "==> Running unit tests <=="
        silent: true
      - go test -race -v ./...
      - cmd: echo "==> Running unit tests with ldflags <=="
        silent: true
      - go test -race -v -ldflags '{{.LDFLAGS}}' ./...

  test-style:
    desc: Run all style checks
    cmds:
      - task: test-lint
      - task: test-editorconfig
      - task: test-prettier

  test-lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  lint:
    desc: Run super-linter locally via podman, matching the CI workflow
    # The env flags mirror .github/workflows/linter-full.yml. The extra
    # mounts hide nix-managed local artifacts that CI never sees so biome
    # (which scans the workspace on its own and ignores FILTER_REGEX_EXCLUDE)
    # doesn't trip on dangling symlinks:
    #   -v /tmp/lint/.direnv         anonymous empty volume shadowing the
    #                                direnv symlink farm (.direnv/*)
    #   -v /dev/null:/tmp/lint/result:ro
    #                                replaces the `nix build` result symlink
    #                                with /dev/null (anonymous volume can't
    #                                overlay a symlink, only a directory)
    cmds:
      - >
        podman run --rm
        -e RUN_LOCAL=true
        -e DEFAULT_BRANCH=main
        -e VALIDATE_ALL_CODEBASE=true
        -e VALIDATE_JSCPD=false
        -e VALIDATE_GO=false
        -e VALIDATE_RUBY=false
        -e VALIDATE_BIOME_FORMAT=false
        -v "$(pwd):/tmp/lint:Z"
        -v /tmp/lint/.direnv
        -v /dev/null:/tmp/lint/result:ro
        {{.SUPER_LINTER_IMAGE}}

  test-editorconfig:
    desc: Check editorconfig compliance
    cmds:
      - editorconfig-checker

  test-prettier:
    desc: Check markdown formatting with prettier
    cmds:
      - prettier --check "**/*.md" "**/*.yaml" "**/*.yml"

  test-goreleaser:
    desc: Test goreleaser config with snapshot build
    cmds:
      - goreleaser release --snapshot --clean

  format:
    desc: Format Go code with goimports
    cmds:
      - >-
        go list -f '{{"{{.Dir}}"}}' ./...
        | xargs goimports -w -local {{.MODULE}}

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf '{{.BINDIR}}' dist/

  install:
    desc: Install to /usr/local/bin
    deps: [build]
    cmds:
      - install '{{.BINDIR}}/{{.BINNAME}}' '{{.INSTALL_PATH}}/{{.BINNAME}}'

  local-install:
    desc: Install to ~/.local/bin
    deps: [build]
    cmds:
      - >-
        install '{{.BINDIR}}/{{.BINNAME}}'
        '{{.LOCAL_INSTALL_PATH}}/{{.BINNAME}}'

  info:
    desc: Print build info
    silent: true
    cmds:
      - 'echo "Version:        {{.VERSION}}"'
      - 'echo "Git Tag:        {{.GIT_TAG}}"'
      - 'echo "Git Commit:     {{.GIT_COMMIT}}"'
      - 'echo "Git Tree State: {{.GIT_DIRTY}}"'

  all:
    desc: Run all checks
    cmds:
      - task: clean
      - task: format
      - task: test
      - task: test-unit
      - task: test-goreleaser
